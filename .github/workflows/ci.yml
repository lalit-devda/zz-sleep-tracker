name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Analyze · Test · Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze (no fatal infos / warnings)
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests (VM — no Chrome needed for contract tests)
        run: flutter test --reporter=expanded

      - name: Build web (with dummy dart-define)
        run: |
          flutter build web \
            --dart-define=FIREBASE_API_KEY=CI_DUMMY_KEY
