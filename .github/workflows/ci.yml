name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Analyze · Test · Build Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.2'

      - name: Install DartStream CLI
        run: |
          dart pub global activate ds_dartstream 0.0.8
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Validate DartStream manifest
        run: dartstream validate --strict

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze (no fatal infos / warnings)
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests (VM — no Chrome needed for contract tests)
        run: flutter test --reporter=expanded

      - name: Build web (dummy dart-define — never use real secrets in CI env vars)
        run: |
          flutter build web \
            --dart-define=FIREBASE_API_KEY=CI_DUMMY_KEY \
            --dart-define=OAUTH_CLIENT_ID=CI_DUMMY_CLIENT_ID \
            --dart-define=OAUTH_CLIENT_SECRET=CI_DUMMY_SECRET
